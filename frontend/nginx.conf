server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow resume uploads (default nginx limit is 1MB).
    client_max_body_size 25m;

    # Reverse-proxy API calls to the backend container (compose service name).
    # The SPA calls same-origin /api/* paths, exactly like the Vite dev proxy.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # AI interview / exam generation can be slow
        proxy_send_timeout 180s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
